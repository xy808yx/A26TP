<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Return to Training</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <style>
    :root {
        --bg: #0c0c0c;
        --surface: #151515;
        --surface2: #1a1a1a;
        --border: #262626;
        --border-h: #333;
        --text: #e8e4df;
        --dim: #908c86;
        --muted: #5c5955;
        --accent: #c9a96e;
        --accent-dim: #8a7548;
        --accent-glow: rgba(201, 169, 110, 0.08);
        --white: #f5f2ed;
        --red: #c45c4a;
        --green: #5a9a5a;
        --green-bg: rgba(90, 154, 90, 0.07);
        --green-border: rgba(90, 154, 90, 0.25)
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box
    }

    body {
        background: var(--bg);
        color: var(--text);
        font-family: 'Outfit', sans-serif;
        -webkit-font-smoothing: antialiased
    }

    .nav {
        position: sticky;
        top: 0;
        z-index: 100;
        background: rgba(12, 12, 12, 0.95);
        backdrop-filter: blur(16px);
        border-bottom: 1px solid var(--border);
        padding: 14px 24px
    }

    .ni {
        max-width: 680px;
        margin: 0 auto;
        display: flex;
        justify-content: space-between;
        align-items: center
    }

    .nt {
        font-family: 'DM Serif Display', serif;
        font-size: 22px;
        color: var(--white)
    }

    .ns {
        font-size: 12px;
        color: var(--dim);
        font-family: 'JetBrains Mono', monospace;
        margin-top: 3px
    }

    .tabs {
        display: flex;
        gap: 4px
    }

    .tab {
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px 16px;
        color: var(--dim);
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        font-family: 'JetBrains Mono', monospace;
        transition: all 0.25s
    }

    .tab:hover {
        border-color: var(--border-h);
        color: var(--text)
    }

    .tab.active {
        background: var(--accent-dim);
        border-color: var(--accent-dim);
        color: var(--white)
    }

    .co {
        max-width: 680px;
        margin: 0 auto;
        padding: 20px 24px 120px
    }

    .sl {
        font-family: 'JetBrains Mono', monospace;
        font-size: 12px;
        letter-spacing: 2.5px;
        color: var(--accent);
        text-transform: uppercase;
        margin-bottom: 12px;
        margin-top: 24px
    }

    .sl:first-child {
        margin-top: 0
    }

    .sn {
        font-size: 14px;
        color: var(--dim);
        font-style: italic;
        margin-bottom: 14px;
        line-height: 1.6;
        padding: 10px 16px;
        border-left: 2px solid var(--accent-dim);
        background: var(--accent-glow);
        border-radius: 0 8px 8px 0
    }

    .sw-wrap {
        display: flex;
        gap: 1px;
        background: var(--border);
        border-radius: 12px;
        overflow: hidden;
        margin-bottom: 20px
    }

    .sw {
        flex: 1;
        background: var(--surface);
        border: none;
        padding: 16px 8px;
        cursor: pointer;
        text-align: center;
        transition: all 0.25s
    }

    .sw:hover {
        background: var(--surface2)
    }

    .sw.active {
        background: var(--surface2);
        box-shadow: inset 0 -2px 0 var(--accent)
    }

    .sw .s2 {
        font-family: 'JetBrains Mono', monospace;
        font-size: 10px;
        letter-spacing: 1.5px;
        color: var(--muted);
        text-transform: uppercase;
        margin-bottom: 4px
    }

    .sw.active .s2 {
        color: var(--accent)
    }

    .sw .sv {
        font-size: 15px;
        font-weight: 600;
        color: var(--dim)
    }

    .sw.active .sv {
        color: var(--white)
    }

    .pb {
        height: 5px;
        background: var(--border);
        border-radius: 3px;
        overflow: hidden;
        margin-bottom: 18px
    }

    .pf {
        height: 100%;
        border-radius: 3px;
        transition: width 0.4s ease, background 0.3s
    }

    .ci {
        display: flex;
        align-items: center;
        gap: 14px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 14px 18px;
        margin-bottom: 6px;
        cursor: pointer;
        transition: all 0.25s;
        user-select: none
    }

    .ci:hover {
        border-color: var(--border-h);
        background: var(--surface2)
    }

    .ci.done {
        background: var(--green-bg);
        border-color: var(--green-border)
    }

    .cb {
        width: 28px;
        height: 28px;
        border-radius: 7px;
        border: 2px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--green);
        font-size: 15px;
        font-weight: 700;
        flex-shrink: 0;
        transition: all 0.25s
    }

    .ci.done .cb {
        border-color: var(--green);
        background: rgba(90, 154, 90, 0.15)
    }

    .cn {
        font-size: 15px;
        font-weight: 500;
        color: var(--white);
        transition: color 0.2s;
        line-height: 1.3
    }

    .ci.done .cn {
        color: var(--green)
    }

    .cr {
        font-size: 13px;
        color: var(--dim);
        font-family: 'JetBrains Mono', monospace;
        margin-top: 2px
    }

    .ct {
        font-family: 'JetBrains Mono', monospace;
        font-size: 10px;
        color: var(--accent-dim);
        letter-spacing: 1px;
        padding: 3px 8px;
        background: var(--surface2);
        border-radius: 4px;
        margin-left: auto;
        flex-shrink: 0;
        border: 1px solid var(--border)
    }

    .tw {
        border: 1px solid var(--border);
        border-radius: 10px;
        overflow: hidden;
        margin-bottom: 14px
    }

    table {
        width: 100%;
        border-collapse: collapse
    }

    thead th {
        background: var(--surface2);
        font-family: 'JetBrains Mono', monospace;
        font-size: 10px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: var(--muted);
        padding: 12px 14px;
        text-align: left;
        font-weight: 500;
        border-bottom: 1px solid var(--border)
    }

    tbody td {
        padding: 12px 14px;
        font-size: 14px;
        border-bottom: 1px solid var(--border);
        vertical-align: top;
        color: var(--text)
    }

    tbody tr:last-child td {
        border-bottom: none
    }

    tbody tr:nth-child(even) {
        background: var(--surface)
    }

    td a {
        color: var(--accent);
        text-decoration: none;
        font-size: 13px;
        font-weight: 500
    }

    td a:hover {
        text-decoration: underline
    }

    .mc {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 8px 0;
        cursor: pointer;
        user-select: none
    }

    .mb {
        width: 20px;
        height: 20px;
        border-radius: 5px;
        border: 2px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--green);
        font-size: 11px;
        font-weight: 700;
        flex-shrink: 0;
        transition: all 0.2s
    }

    .mc.done .mb {
        border-color: var(--green);
        background: rgba(90, 154, 90, 0.15)
    }

    .m2 {
        font-size: 14px;
        color: var(--dim);
        transition: color 0.2s;
        line-height: 1.4
    }

    .mc.done .m2 {
        color: var(--green)
    }

    .mw {
        color: var(--red);
        font-weight: 600;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.5px
    }

    .gate {
        border: 1px solid var(--border);
        border-radius: 10px;
        overflow: hidden;
        margin-bottom: 14px
    }

    .gate.cleared {
        border-color: var(--green-border);
        opacity: 0.6
    }

    .gh {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 16px 18px;
        background: var(--surface);
        border-bottom: 1px solid var(--border)
    }

    .gate.cleared .gh {
        background: var(--green-bg)
    }

    .gn {
        font-weight: 700;
        font-size: 15px;
        color: var(--white)
    }

    .gate.cleared .gn {
        color: var(--green)
    }

    .g2 {
        font-family: 'JetBrains Mono', monospace;
        font-size: 11px;
        color: var(--accent);
        letter-spacing: 1px
    }

    .gate.cleared .g2 {
        color: var(--green)
    }

    .gb {
        padding: 14px 18px
    }

    .gt2 {
        font-size: 15px;
        color: var(--text);
        margin-bottom: 10px;
        font-weight: 500;
        line-height: 1.5
    }

    .gt2 span {
        font-family: 'JetBrains Mono', monospace;
        font-size: 11px;
        color: var(--accent-dim);
        margin-right: 6px;
        text-transform: uppercase;
        letter-spacing: 1px
    }

    .gl {
        font-size: 14px;
        color: var(--dim);
        padding: 3px 0 3px 16px;
        position: relative;
        line-height: 1.5
    }

    .gl::before {
        content: '→';
        position: absolute;
        left: 0;
        color: var(--accent-dim)
    }

    .tl {
        position: relative;
        padding-left: 28px
    }

    .tl::before {
        content: '';
        position: absolute;
        left: 7px;
        top: 7px;
        bottom: 7px;
        width: 1px;
        background: var(--border)
    }

    .ti {
        position: relative;
        padding-bottom: 22px
    }

    .ti:last-child {
        padding-bottom: 0
    }

    .ti::before {
        content: '';
        position: absolute;
        left: -24px;
        top: 6px;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--accent-dim);
        border: 2px solid var(--bg)
    }

    .ti.cleared::before {
        background: var(--green)
    }

    .ti.current::before {
        background: var(--accent);
        box-shadow: 0 0 8px rgba(201, 169, 110, 0.4)
    }

    .t3 {
        font-family: 'JetBrains Mono', monospace;
        font-size: 11px;
        color: var(--accent-dim);
        letter-spacing: 1px
    }

    .t4 {
        font-size: 15px;
        color: var(--text);
        font-weight: 600;
        margin: 2px 0
    }

    .t5 {
        font-size: 14px;
        color: var(--dim)
    }

    .bio {
        margin-bottom: 18px;
        padding: 12px 16px;
        border-left: 2px solid var(--border);
        border-radius: 0 8px 8px 0;
        background: var(--surface)
    }

    .bio.warn {
        border-left-color: var(--red)
    }

    .bt {
        font-weight: 700;
        font-size: 13px;
        color: var(--accent);
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 6px
    }

    .bio.warn .bt {
        color: var(--red)
    }

    .bio p {
        font-size: 14px;
        color: var(--dim);
        line-height: 1.7
    }

    .ic {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 16px 20px;
        margin-bottom: 10px
    }

    .i2 {
        font-size: 16px;
        font-weight: 600;
        color: var(--white);
        margin-bottom: 4px
    }

    .i3 {
        font-size: 14px;
        color: var(--dim);
        line-height: 1.6
    }

    .rr {
        text-align: center;
        margin-top: 20px
    }

    .bg {
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px 20px;
        color: var(--muted);
        font-size: 12px;
        cursor: pointer;
        font-family: 'JetBrains Mono', monospace;
        transition: all 0.2s
    }

    .bg:hover {
        border-color: var(--border-h);
        color: var(--dim)
    }

    .fl {
        text-align: center;
        margin-top: 28px;
        padding-top: 18px;
        border-top: 1px solid var(--border);
        font-family: 'JetBrains Mono', monospace;
        font-size: 11px;
        color: var(--muted);
        letter-spacing: 1px
    }

    .al {
        height: 2px;
        background: linear-gradient(90deg, transparent, var(--accent-dim), transparent);
        margin-bottom: 20px;
        border-radius: 1px
    }
    </style>
</head>
<body>
    <div class="nav">
        <div class="ni">
            <div>
                <div class="nt">Return to Training</div>
                <div class="ns" id="ns"></div>
            </div>
            <div class="tabs">
                <button class="tab active" onclick="st('today')" id="tab-today">TODAY</button>
                <button class="tab" onclick="st('mobility')" id="tab-mobility">MOBILITY</button>
                <button class="tab" onclick="st('reference')" id="tab-reference">REF</button>
            </div>
        </div>
    </div>
    <div class="co" id="app"></div>
    <script>
    const D = [

    ];
    const MR = [

    },
    {

    },
    {

    {

    {

    {

    {

    const MS = [

    },

    },

    }, {

    },

    }, {

    },

    }, {

    },

    },
    {

    }, {
        id: "m28",
        t: "Doorway stretch — 30s × 3"
    },
    ];
    const MO = [{
        id: "m30",
        t: "Fire hydrants"
    }, {
        id: "m31",
        t: "Alternating scorpions"
    }];
    const TH = [
    {
        n: "Hip Mobility Series (Lawson McDonald)",
        no: "General hip compensation clearing",
        l: "https://www.youtube.com/watch?v=tO_2mB53Bgs"
    },
    {
        n: "Left Obturator Nerve Floss",
        no: "Contralateral compensation",
        l: "https://youtu.be/VEbVmzcIiv8"
    },
    {
        n: "Right Femoral Nerve Floss",
        no: "Only if R. anterior thigh symptoms",
        l: "https://www.youtube.com/watch?v=KIYNdFvM4vc"
    },
    ];
    const DY = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
    function tk() {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`
    }
    let S = {
        tab: "today",
        wo: "pull",
        ck: {},
        mk: {}
    };
    function ld() {
        try {
            S.ck = JSON.parse(localStorage.getItem("rtc6") || "{}")
        } catch (e) {}
        try {
            S.mk = JSON.parse(localStorage.getItem("rtm6") || "{}")
        } catch (e) {}
        try {
            const w = localStorage.getItem("rtw6");
            if (w)
                S.wo = w
        } catch (e) {}
    }
    function sv() {
        localStorage.setItem("rtc6", JSON.stringify(S.ck));
        localStorage.setItem("rtm6", JSON.stringify(S.mk));
        localStorage.setItem("rtw6", S.wo)
    }
    function tg(id) {
        const k = tk();
        if (!S.ck[k])
            S.ck[k] = [];
        const c = S.ck[k];
        S.ck[k] = c.includes(id) ? c.filter(x => x !== id) : [...c, id];
        sv();
        rn()
    }
    function tm(id) {
        const k = tk();
        if (!S.mk[k])
            S.mk[k] = [];
        const c = S.mk[k];
        S.mk[k] = c.includes(id) ? c.filter(x => x !== id) : [...c, id];
        sv();
        rn()
    }
    function sw(w) {
        S.wo = w;
        sv();
        rn()
    }
    function st(t) {
        S.tab = t;
        document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + t).classList.add('active');
        rn()
    }
    function rt() {
        const k = tk();
        delete S.ck[k];
        delete S.mk[k];
        sv();
        rn()
    }
    function ci(i, ck, sl) {
        const d = ck.includes(i.id);
        const lk = sl && i.l ? ` <a href="${i.l}" target="_blank" onclick="event.stopPropagation()" style="font-size:12px;color:var(--accent);font-weight:500">▶ video</a>` : '';
        return `<div class="ci ${d ? 'done' : ''}" onclick="tg('${i.id}')"><div class="cb">${d ? '✓' : ''}</div><div style="flex:1"><div class="cn">${i.n}${lk}</div><div class="cr">${i.r}</div></div>${i.t ? `<span class="ct">${i.t}</span>` : ''}</div>`
    }
    function mi(i, ck) {
        const d = ck.includes(i.id);
        const w = i.w ? ` <span class="mw">${i.w}</span>` : '';
        return `<div class="mc ${d ? 'done' : ''}" onclick="tm('${i.id}')"><div class="mb">${d ? '✓' : ''}</div><div class="m2">${i.t}${w}</div></div>`
    }
    function rn() {
        const k = tk(),
            dow = new Date().getDay(),
