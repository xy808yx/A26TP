<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Return to Training</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23000000'/%3E%3Cpath d='M8 20 L16 12 L24 20' fill='none' stroke='%23ff6a1f' stroke-width='3.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
    <style>
    :root {
        --bg: #0c0c0c;
        --surface: #161616;
        --surface2: #1d1d1d;
        --border: #2a2a2a;
        --border-h: #3a3a3a;
        --text: #ece8e2;
        --dim: #9a9690;
        --muted: #65615c;
        --accent: #ff6a1f;
        --accent-dim: #c25a1c;
        --accent-glow: rgba(255, 106, 31, 0.12);
        --white: #f7f4ef;
        --red: #c45c4a;
        --green: #6aac6a;
        --green-bg: rgba(106, 172, 106, 0.09);
        --green-border: rgba(106, 172, 106, 0.3);
        --cardio: #7a9cc4;
        --cardio-dim: #4a6488
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box
    }

    body {
        background: var(--bg);
        color: var(--text);
        font-family: 'Outfit', sans-serif;
        -webkit-font-smoothing: antialiased;
        font-size: 16px
    }

    .nav {
        position: sticky;
        top: 0;
        z-index: 100;
        background: rgba(12, 12, 12, 0.96);
        backdrop-filter: blur(16px);
        border-bottom: 1px solid var(--border);
        padding: 16px 24px
    }

    .ni {
        max-width: 720px;
        margin: 0 auto;
        display: flex;
        justify-content: space-between;
        align-items: center
    }

    .nt {
        font-family: 'DM Serif Display', serif;
        font-size: 26px;
        color: var(--white);
        line-height: 1
    }

    .ns {
        font-size: 13px;
        color: var(--dim);
        margin-top: 5px;
        letter-spacing: 0.5px
    }

    .tabs {
        display: flex;
        gap: 5px
    }

    .tab {
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 9px;
        padding: 10px 18px;
        color: var(--dim);
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        transition: all 0.25s
    }

    .tab:hover {
        border-color: var(--border-h);
        color: var(--text)
    }

    .tab.active {
        background: var(--accent-dim);
        border-color: var(--accent-dim);
        color: var(--white)
    }

    .co {
        max-width: 720px;
        margin: 0 auto;
        padding: 24px 24px 120px
    }/* WEEK ROTATION STRIP */
    .week {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 6px;
        margin-bottom: 28px
    }

    .day {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 14px 4px;
        cursor: pointer;
        text-align: center;
        transition: all 0.2s;
        position: relative;
        overflow: hidden
    }

    .day:hover {
        border-color: var(--border-h);
        background: var(--surface2)
    }

    .day .dl {
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 1px;
        color: var(--muted);
        text-transform: uppercase;
        margin-bottom: 8px
    }

    .day .dw {
        font-size: 13px;
        font-weight: 600;
        color: var(--dim);
        line-height: 1.2
    }

    .day.sel {
        background: var(--surface2);
        border-color: var(--accent);
        box-shadow: 0 0 0 1px var(--accent)
    }

    .day.sel .dl {
        color: var(--accent)
    }

    .day.sel .dw {
        color: var(--white)
    }

    .day.pull .dw {
        color: var(--accent)
    }

    .day.push .dw {
        color: var(--accent)
    }

    .day.cardio .dw {
        color: var(--cardio)
    }

    .day.off .dw {
        color: var(--muted)
    }

    .day .today-dot {
        position: absolute;
        top: 6px;
        right: 6px;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--accent)
    }

    .day.sel.pull, .day.sel.push {
        border-color: var(--accent);
        box-shadow: 0 0 0 1px var(--accent)
    }

    .day.sel.cardio {
        border-color: var(--cardio);
        box-shadow: 0 0 0 1px var(--cardio)
    }

    .day.sel.cardio .dl {
        color: var(--cardio)
    }

    .sl {
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 2.5px;
        color: var(--accent);
        text-transform: uppercase;
        margin-bottom: 14px;
        margin-top: 32px
    }

    .sl.first {
        margin-top: 0
    }

    .sl.muted {
        color: var(--muted)
    }

    .sn {
        font-size: 15px;
        color: var(--dim);
        font-style: italic;
        margin-bottom: 16px;
        line-height: 1.6;
        padding: 12px 18px;
        border-left: 3px solid var(--accent-dim);
        background: var(--accent-glow);
        border-radius: 0 10px 10px 0
    }

    .pb {
        height: 6px;
        background: var(--border);
        border-radius: 3px;
        overflow: hidden;
        margin-bottom: 20px
    }

    .pf {
        height: 100%;
        border-radius: 3px;
        transition: width 0.4s ease, background 0.3s
    }

    .ci {
        display: flex;
        align-items: center;
        gap: 16px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 16px 20px;
        margin-bottom: 8px;
        cursor: pointer;
        transition: all 0.22s;
        user-select: none
    }

    .ci:hover {
        border-color: var(--border-h);
        background: var(--surface2)
    }

    .ci.done {
        background: var(--green-bg);
        border-color: var(--green-border)
    }

    .cb {
        width: 32px;
        height: 32px;
        border-radius: 8px;
        border: 2px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--green);
        font-size: 17px;
        font-weight: 700;
        flex-shrink: 0;
        transition: all 0.22s
    }

    .ci.done .cb {
        border-color: var(--green);
        background: rgba(106, 172, 106, 0.16)
    }

    .cn {
        font-size: 17px;
        font-weight: 500;
        color: var(--white);
        transition: color 0.2s;
        line-height: 1.3
    }

    .ci.done .cn {
        color: var(--green)
    }

    .cr {
        font-size: 14px;
        color: var(--dim);
        margin-top: 3px
    }

    .ct {
        font-size: 11px;
        font-weight: 600;
        color: var(--accent-dim);
        letter-spacing: 1px;
        padding: 4px 9px;
        background: var(--surface2);
        border-radius: 5px;
        margin-left: auto;
        flex-shrink: 0;
        border: 1px solid var(--border)
    }

    .tw {
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
        margin-bottom: 16px
    }

    table {
        width: 100%;
        border-collapse: collapse
    }

    thead th {
        background: var(--surface2);
        font-size: 11px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: var(--muted);
        padding: 14px 16px;
        text-align: left;
        font-weight: 500;
        border-bottom: 1px solid var(--border)
    }

    tbody td {
        padding: 14px 16px;
        font-size: 15px;
        border-bottom: 1px solid var(--border);
        vertical-align: top;
        color: var(--text)
    }

    tbody tr:last-child td {
        border-bottom: none
    }

    tbody tr:nth-child(even) {
        background: var(--surface)
    }

    td a {
        color: var(--accent);
        text-decoration: none;
        font-size: 14px;
        font-weight: 500
    }

    td a:hover {
        text-decoration: underline
    }

    .mc {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 10px 0;
        cursor: pointer;
        user-select: none
    }

    .mb {
        width: 24px;
        height: 24px;
        border-radius: 6px;
        border: 2px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--green);
        font-size: 13px;
        font-weight: 700;
        flex-shrink: 0;
        transition: all 0.2s
    }

    .mc.done .mb {
        border-color: var(--green);
        background: rgba(106, 172, 106, 0.16)
    }

    .m2 {
        font-size: 15px;
        color: var(--dim);
        transition: color 0.2s;
        line-height: 1.4
    }

    .mc.done .m2 {
        color: var(--green)
    }

    .mw {
        color: var(--red);
        font-weight: 600;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.5px
    }

    .gate {
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
        margin-bottom: 16px
    }

    .gate.cleared {
        border-color: var(--green-border);
        opacity: 0.65
    }

    .gh {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 18px 20px;
        background: var(--surface);
        border-bottom: 1px solid var(--border)
    }

    .gate.cleared .gh {
        background: var(--green-bg)
    }

    .gn {
        font-weight: 700;
        font-size: 16px;
        color: var(--white)
    }

    .gate.cleared .gn {
        color: var(--green)
    }

    .g2 {
        font-size: 12px;
        font-weight: 600;
        color: var(--accent);
        letter-spacing: 1.5px
    }

    .gate.cleared .g2 {
        color: var(--green)
    }

    .gb {
        padding: 16px 20px
    }

    .gt2 {
        font-size: 16px;
        color: var(--text);
        margin-bottom: 12px;
        font-weight: 500;
        line-height: 1.5
    }

    .gt2 span {
        font-size: 12px;
        color: var(--accent-dim);
        margin-right: 6px;
        text-transform: uppercase;
        letter-spacing: 1px
    }

    .gl {
        font-size: 15px;
        color: var(--dim);
        padding: 4px 0 4px 18px;
        position: relative;
        line-height: 1.5
    }

    .gl::before {
        content: '→';
        position: absolute;
        left: 0;
        color: var(--accent-dim)
    }

    .tl {
        position: relative;
        padding-left: 30px
    }

    .tl::before {
        content: '';
        position: absolute;
        left: 8px;
        top: 8px;
        bottom: 8px;
        width: 1px;
        background: var(--border)
    }

    .ti {
        position: relative;
        padding-bottom: 24px
    }

    .ti:last-child {
        padding-bottom: 0
    }

    .ti::before {
        content: '';
        position: absolute;
        left: -25px;
        top: 6px;
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: var(--accent-dim);
        border: 2px solid var(--bg)
    }

    .ti.cleared::before {
        background: var(--green)
    }

    .ti.current::before {
        background: var(--accent);
        box-shadow: 0 0 12px rgba(255, 106, 31, 0.6)
    }

    .t3 {
        font-size: 12px;
        font-weight: 600;
        color: var(--accent-dim);
        letter-spacing: 1.5px;
        text-transform: uppercase
    }

    .t4 {
        font-size: 16px;
        color: var(--text);
        font-weight: 600;
        margin: 3px 0
    }

    .t5 {
        font-size: 15px;
        color: var(--dim)
    }

    .bio {
        margin-bottom: 20px;
        padding: 14px 18px;
        border-left: 3px solid var(--border);
        border-radius: 0 10px 10px 0;
        background: var(--surface)
    }

    .bio.warn {
        border-left-color: var(--red)
    }

    .bt {
        font-weight: 700;
        font-size: 14px;
        color: var(--accent);
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 8px
    }

    .bio.warn .bt {
        color: var(--red)
    }

    .bio p {
        font-size: 15px;
        color: var(--dim);
        line-height: 1.7
    }

    .ic {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 18px 22px;
        margin-bottom: 12px
    }

    .i2 {
        font-size: 18px;
        font-weight: 600;
        color: var(--white);
        margin-bottom: 5px
    }

    .i3 {
        font-size: 15px;
        color: var(--dim);
        line-height: 1.6
    }

    .rr {
        text-align: center;
        margin-top: 24px
    }

    .bg {
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 9px;
        padding: 12px 24px;
        color: var(--muted);
        font-size: 13px;
        cursor: pointer;
        transition: all 0.2s
    }

    .bg:hover {
        border-color: var(--border-h);
        color: var(--dim)
    }

    .fl {
        text-align: center;
        margin-top: 32px;
        padding-top: 20px;
        border-top: 1px solid var(--border);
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        color: var(--muted);
        letter-spacing: 1px
    }

    @media (max-width: 560px) {
        .nav {
            padding: 16px 16px
        }

        .ni {
            flex-direction: column;
            align-items: stretch;
            gap: 16px
        }

        .nt {
            font-size: 25px;
            line-height: 1.1
        }

        .ns {
            margin-top: 4px
        }

        .tabs {
            width: 100%;
            gap: 6px
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 11px 6px;
            font-size: 12px;
            letter-spacing: 1px
        }

        .co {
            padding: 20px 16px 100px
        }

        .week {
            gap: 4px
        }

        .day {
            padding: 10px 2px;
            border-radius: 9px
        }

        .day .dl {
            font-size: 11px;
            margin-bottom: 5px
        }

        .day .dw {
            font-size: 11px
        }

        .cn {
            font-size: 16px
        }

        .ci {
            padding: 15px 16px;
            gap: 13px
        }
    }
    </style>
</head>

        no: "Only if R. anterior thigh symptoms",
        l: "https://www.youtube.com/watch?v=KIYNdFvM4vc"
    },
    ];
    // CURRENT PHASE — bump to 5 when Gate 3 clears. Activates Phase-5 work (fast calf raises, stick landings) in TODAY.
    const PHASE = 4;
    // 7-day rotation: Sun=Rest(fast begins), Mon=Pull, Tue=Cardio(fasted), Wed=Push, Thu=Pull, Fri=Cardio, Sat=Push
    const ROT = {
        0: "off",
        1: "pull",
        2: "cardio",
        3: "push",
        4: "pull",
        5: "cardio",
        6: "push"
    };
    const DABBR = {
        1: "Mon",
        2: "Tue",
        3: "Wed",
        4: "Thu",
        5: "Fri",
        6: "Sat",
        0: "Sun"
    };
    const WLABEL = {
        pull: "Pull",
        push: "Push",
        cardio: "Cardio",
        off: "Off"
    };
    const DY = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
    function tk() {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`
    }
    let S = {
        tab: "today",
        sel: new Date().getDay(),
        ck: {},
        mk: {}
    };
    function ld() {
        try {
            S.ck = JSON.parse(localStorage.getItem("rtc7") || "{}")
        } catch (e) {}
        try {
            S.mk = JSON.parse(localStorage.getItem("rtm7") || "{}")
        } catch (e) {}
    }
    function sv() {
        localStorage.setItem("rtc7", JSON.stringify(S.ck));
        localStorage.setItem("rtm7", JSON.stringify(S.mk))
    }
    function tg(id) {
        const k = tk();
        if (!S.ck[k])
            S.ck[k] = [];
        const c = S.ck[k];
        S.ck[k] = c.includes(id) ? c.filter(x => x !== id) : [...c, id];
        sv();
        rn()
    }
    function tm(id) {
        const k = tk();
        if (!S.mk[k])
            S.mk[k] = [];
        const c = S.mk[k];
        S.mk[k] = c.includes(id) ? c.filter(x => x !== id) : [...c, id];
        sv();
        rn()
    }
    function selDay(d) {
        S.sel = d;
        rn()
    }
    function st(t) {
        S.tab = t;
        document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + t).classList.add('active');
        rn()
    }
    function rt() {
        const k = tk();
        delete S.ck[k];
        delete S.mk[k];
        sv();
        rn()
    }
    function ci(i, ck, sl) {
        const d = ck.includes(i.id);
        const lk = sl && i.l ? ` <a href="${i.l}" target="_blank" onclick="event.stopPropagation()">▶ video</a>` : '';
        return `<div class="ci ${d ? 'done' : ''}" onclick="tg('${i.id}')"><div class="cb">${d ? '✓' : ''}</div><div style="flex:1"><div class="cn">${i.n}${lk}</div><div class="cr">${i.r}</div></div>${i.t ? `<span class="ct">${i.t}</span>` : ''}</div>`
    }
    function mi(i, ck) {
        const d = ck.includes(i.id);
        const w = i.w ? ` <span class="mw">${i.w}</span>` : '';
        return `<div class="mc ${d ? 'done' : ''}" onclick="tm('${i.id}')"><div class="mb">${d ? '✓' : ''}</div><div class="m2">${i.t}${w}</div></div>`
    }
    function rn() {
        const k = tk(),
            todayDow = new Date().getDay(),
            ck = S.ck[k] || [],
            mk = S.mk[k] || [];
        document.getElementById("ns").textContent = `${DY[todayDow]} · ${k} · Phase ${PHASE}`;
        const a = document.getElementById("app");
        if (S.tab === "today") {
            let h = "";
            // WEEK ROTATION STRIP
            h += `<div class="week">`;
            [1, 2, 3, 4, 5, 6, 0].forEach(dow => {
                const wo = ROT[dow];
                const isToday = dow === todayDow;
                const isSel = dow === S.sel;
                h += `<div class="day ${wo} ${isSel ? 'sel' : ''}" onclick="selDay(${dow})">${isToday ? '<div class="today-dot"></div>' : ''}<div class="dl">${DABBR[dow]}</div><div class="dw">${WLABEL[wo]}</div></div>`;
            });
            h += `</div>`;

            const wo = ROT[S.sel];
            const isTraining = wo === "pull" || wo === "push";
            const isPull = wo === "pull";
            let wi = [],
                wl = "",
                wn = "";
            if (wo === "pull") {
                wi = PULL;
                wl = "Pull + Calf Raises";
                wn = "Straight sets, full rest. Hang pause replaces dead hangs. Consistent reps across all 4 sets → add weight. Calf raises: when 3×15 is easy, hold a plate."
            }
            else if (wo === "push") {
                wi = PUSH;
                wl = "Push + BSS";
                wn = "Straight sets, full rest 90-120s. Top of rep range for 2 consecutive sessions → add 5 lbs. BSS: bodyweight first, then hold plates."
            }
            else if (wo === "cardio") {
                wi = CARDIO;
                wl = "Cardio + Mobility";
                wn = "Sprints on Friday — Tuesday is the fasted recovery day (bike/swim + mobility only). Volume before intensity. Then aerobic + full mobility."
            }
            wi = wi.filter(w => !(w.ph && w.ph > PHASE));

            // WORKOUT FIRST
            if (isTraining || wo === "cardio") {
                const wc = wi.length,
                    wd = wi.filter(w => ck.includes(w.id)).length;
                const wp = wc ? Math.round((wd / wc) * 100) : 0;
                h += `<div class="sl first">${wl}</div>`;
                h += `<div class="sn">${wn}</div>`;
                h += `<div class="pb"><div class="pf" style="width:${wp}%;background:${wp === 100 ? 'var(--green)' : 'var(--accent)'}"></div></div>`;
                h += wi.map(w => ci(w, ck, true)).join("");
            } else {
                h += `<div class="sl first">Off Day</div>`;
                h += `<div class="ic"><div class="i2">Rest</div><div class="i3">Daily block + 30 min walk. That's it. Full recovery.</div></div>`;
            }

            // DAILY BLOCK BELOW
            const df = D.filter(d => !(isTraining && d.skip === "training"));
            const dd = df.filter(d => ck.includes(d.id)).length;
            const dp = Math.round((dd / df.length) * 100);
            h += `<div class="sl">Daily Block</div>`;
            if (isTraining)
                h += `<div class="sn">Dead hangs skipped — ${isPull ? 'hang pause on pull-up reps' : 'hanging leg raises'} covers it.</div>`;
            h += `<div class="pb"><div class="pf" style="width:${dp}%;background:${dp === 100 ? 'var(--green)' : 'var(--accent)'}"></div></div>`;
            h += df.map(d => ci(d, ck, true)).join("");

            // WALKING
            h += `<div style="margin-top:24px"><div class="ic"><div class="i2">Walking — Daily</div><div class="i3">30 min every day. Include backward walking + sprint warm-up drills. Baseline movement + leanness tool.</div></div></div>`;
            h += `<div class="rr"><button class="bg" onclick="rt()">Reset Today</button></div>`;
            a.innerHTML = h;
        } else if (S.tab === "mobility") {
            let h = "";
            h += `<div class="sl first">Mobility Routine</div>`;
            h += `<div class="sn">2-3× per week on cardio days. Warm-up via 30 min cardio.</div>`;
            h += `<div class="sl">Roll / Massage Gun</div>`;
            h += MR.map(m => mi(m, mk)).join("");
            h += `<div class="sl">Stretch</div>`;
            h += MS.map(m => mi(m, mk)).join("");
            h += `<div class="sl">Optional</div>`;
            h += MO.map(m => mi(m, mk)).join("");
            h += `<div class="sl">Therapist Nerve Flossing</div>`;
            h += `<div class="sn">On cardio days. 2-3 sets of 10 smooth oscillations. No sustained holds.</div>`;
            h += `<div class="tw"><table><thead><tr><th>Exercise</th><th>Notes</th><th>Video</th></tr></thead><tbody>`;
            h += TH.map(t => `<tr><td style="font-weight:500;color:var(--white)">${t.n}</td><td style="color:var(--dim)">${t.no}</td><td><a href="${t.l}" target="_blank">▶ Watch</a></td></tr>`).join("");
            h += `</tbody></table></div>`;
            h += `<div class="sn">Popliteus release + chin tucks are in the daily block. Pectineus + quadratus femoris dropped.</div>`;
            h += `<div class="rr"><button class="bg" onclick="rt()">Reset Checks</button></div>`;
            a.innerHTML = h;
        } else {
            a.innerHTML = `
            <div class="sl first">Phase Gates</div>
            <div class="gate cleared"><div class="gh"><span class="gn">Gate 1 — Phase 3</span><span class="g2">✓ CLEARED</span></div><div class="gb"><div class="gt2"><span>Test</span> 25 continuous pain-free double-leg heel raises.</div></div></div>
            <div class="gate cleared"><div class="gh"><span class="gn">Gate 2 — Phase 4</span><span class="g2">✓ CLEARED WK 8</span></div><div class="gb"><div class="gt2"><span>Test</span> 3 × 15 single-leg raises pain-free. Symmetrical dorsiflexion ROM.</div><div class="gl">Deficit calf raises (slow, 3s/3s) active on pull days — structural base.</div><div class="gl">BSS active on push days.</div><div class="gl">Sprint run-throughs begun — 50-60% on turf.</div><div class="gl">Bridge work (fast raises, stick landings) prepped but held for Phase 5 — current week steady.</div></div></div>
            <div class="gate"><div class="gh"><span class="gn">Gate 3 — Phase 5</span><span class="g2">NEXT TARGET</span></div><div class="gb"><div class="gt2"><span>Test</span> 25+ single-leg raises matching other side. Hop LSI ≥90%. ≥90% plantarflexion LSI. ≥2× BW single-leg raise. 10-20 single-leg hops in place, pain-free.</div><div class="gl">Fast calf raises — 3×10 light, crisp, before heavy raises on pull days. Metronome ~132bpm. Speed-of-contraction bridge. Add this first.</div><div class="gl">Stick landings — Friday, fresh, before sprints. 2-3×5, soft &amp; silent, hold 2-3s. Absorption before reactive. Add second, once fast raises are clean.</div><div class="gl">Pogos — bilateral, low, stiff ankle, toes up. Foundational sprint plyo, most calf-direct → waits for the full rep count above.</div><div class="gl">Low horizontal bounds — broad jump + stick → short controlled bounds. Distance before speed.</div><div class="gl">Box jump CHECK (test, not training): 5 bilateral onto ~30cm + 5 unilateral onto 15-20cm, &lt;10% asymmetry. Confirms reactive readiness.</div><div class="gl">Right-side hip/glute hinge (RDLs, step-downs) 2-3×/wk — proximal ≈30% of plantarflexion force; addresses the R-soleus overload chain.</div><div class="gl">Sprint: progress 80% → 95%, each pain-free.</div><div class="gl">Jogging unlocks here — after sprint milestones.</div></div></div>
            <div class="gate"><div class="gh"><span class="gn">Gate 4 — Full Return</span><span class="g2">WK 20-24</span></div><div class="gb"><div class="gt2"><span>Test</span> Hop LSI ≥95%. Pain-free max sprint. One week no symptoms.</div><div class="gl">Single-leg hops → continuous → triple hops. Reactive, sport-specific top of the ladder.</div><div class="gl">True max sprint — full send. Block starts resume LAST.</div><div class="gl">1 week full training per 2 weeks missed.</div></div></div>

            <div class="sl">Sprint Return Progression</div>
            <div class="sn">Increase volume first (more reps), then intensity (faster). Never both in the same session. Check 48hr response each time.</div>
            <div class="tw"><table><thead><tr><th>Stage</th><th>Reps × Distance</th><th>Effort</th><th>Notes</th></tr></thead><tbody>
            <tr><td style="color:var(--green);font-weight:600">Now (wk 8-9)</td><td>3 × 50m</td><td>50-60%</td><td>2-3 more pain-free sessions</td></tr>
            <tr><td>Weeks 9-10</td><td>4-5 × 50-60m</td><td>50-60%</td><td>Volume up, intensity same</td></tr>
            <tr><td>Weeks 10-12</td><td>4-5 × 60m</td><td>60-70%</td><td>Intensity up</td></tr>
            <tr><td>Weeks 12-14</td><td>4-5 × 60-80m</td><td>70-80%</td><td>Approaching Gate 3</td></tr>
            </tbody></table></div>

            <div class="sl">Plyometric Progression</div>
            <div class="sn">Earn the right to be reactive by first proving you can absorb. Count contacts not sets — start ~40-60 quality contacts, increase ≤10-20%/wk. Fresh, before lifts. 1-2×/wk, never back-to-back with sprint or weighted calf.</div>
            <div class="tw"><table><thead><tr><th>Stage</th><th>Exercise</th><th>Gate</th><th>Notes</th></tr></thead><tbody>
            <tr><td style="color:var(--green);font-weight:600">Base</td><td>Heavy deficit raises</td><td>Now</td><td>Slow 3s/3s — structural</td></tr>
            <tr><td>Bridge</td><td>Fast calf raises</td><td>Gate 3</td><td>Light, crisp — speed of contraction</td></tr>
            <tr><td>1</td><td>Stick landings</td><td>Gate 3</td><td>Absorption / eccentric brake</td></tr>
            <tr><td>2</td><td>Pogos (bilateral)</td><td>Gate 3</td><td>Low, stiff ankle, toes up</td></tr>
            <tr><td style="color:var(--cardio);font-weight:600">Test</td><td>Box jump check</td><td>Gate 3</td><td>Readiness test, not training</td></tr>
            <tr><td>3</td><td>Low horizontal bounds</td><td>Gate 3</td><td>Distance before speed</td></tr>
            <tr><td>4</td><td>Single-leg → triple hops</td><td>Gate 4</td><td>Reactive, sport-specific</td></tr>
            </tbody></table></div>

            <div class="sl muted">Parked &amp; Cut</div>
            <div class="gate"><div class="gb"><div class="gt2"><span>Parked till Gate 3</span> Reactive load on healed tissue, waits for the rep count.</div><div class="gl">Pogos, bounds, box-jump test — reactive calf demand.</div><div class="gl">Loaded hip hinge (RDLs), Nordics, single-leg RDLs — eccentric load routes through the calf.</div><div class="gt2" style="margin-top:14px"><span>Cut</span> Bad risk/reward or no sprint value.</div><div class="gl">Depth / drop jumps (shock method) — needs ≥95% LSI, tendon-lag tail bites hardest.</div><div class="gl">Tuck jumps — no value over pogos + bounds.</div><div class="gl">Box jumps as training — keep only as the Gate 3 test.</div></div></div>

            <div class="sl">Timeline</div>
            <div class="tl">
            <div class="ti cleared"><div class="t3">WK 5-6 · CLEARED</div><div class="t4">Gate 1 — Phase 3</div><div class="t5">Seated calf raises began.</div></div>
            <div class="ti cleared"><div class="t3">WK 8 · CLEARED</div><div class="t4">Gate 2 — Phase 4</div><div class="t5">Deficit calf raises. BSS. Sprint run-throughs begun.</div></div>
            <div class="ti current"><div class="t3">GATE 3 · TARGET</div><div class="t4">Phase 5 — Sprint + Plyo</div><div class="t5">Pogos, bounds, full sprint progression to 95%. Jogging unlocks after.</div></div>
            <div class="ti"><div class="t3">WK 20-24 · SEP-OCT</div><div class="t4">Full Return</div><div class="t5">Max velocity. Block starts last. Arrive Hua Hin rebuilt.</div></div>
            </div>

            <div class="sl">How the Tear Heals</div>
            <div class="bio"><div class="bt">Phase 1 — Destruction · Hours 0-48</div><p>Torn fibers retract. Hematoma forms scaffold. Neutrophils (hrs 1-24), macrophages (hrs 24-72) secrete growth factors activating satellite cells.</p></div>
            <div class="bio"><div class="bt">Phase 2 — Repair · Days 3-21</div><p>Satellite cells fuse into myotubes bridging the gap. Fibroblasts lay Type III collagen — weak, disorganized. Grade II gap too large to fully bridge; scar fills the rest. BPC-157 supports via angiogenesis. TB-500 promotes cell migration.</p></div>
            <div class="bio"><div class="bt">Phase 3 — Remodeling · Weeks 3-6+ Months</div><p>Type III → Type I collagen. Organized along stress lines. Concentric = moderate stress. Eccentric = highest demand — remodeling stimulus if mature, re-tear if too early.</p></div>
            <div class="bio warn"><div class="bt">Why Re-Tears Happen</div><p>Scar is stiffer than original muscle. Junction between scar and healthy tissue = weakest link. Re-tears at margins. Bulletproofing = surrounding tissue strong enough the junction never sees failure-threshold forces.</p></div>
            <div class="bio warn"><div class="bt">Peptide False Confidence</div><p>BPC-157/TB-500 accelerate early repair. Pain drops. But collagen maturation runs on its own clock. Tissue feels healed while architecture is immature. Gates test structure, not perception.</p></div>
            <div class="fl">PHASE ${PHASE} ACTIVE · ${PHASE < 5 ? 'UPDATE AT GATE 3' : 'SPEED + PLYO LIVE'}</div>`;
        }
    }
    ld();
    rn();
    </script>
